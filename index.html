<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>互動式集點網站</title>
  <style>
    :root {
      --bg: #060b19;
      --bg2: #0c1630;
      --card: rgba(15, 25, 52, 0.78);
      --text: #e2ebff;
      --muted: #9ab0df;
      --line: rgba(110, 152, 255, 0.28);
      --ok: #22d3ee;
      --warn: #fb923c;
      --main: #3b82f6;
      --main2: #8b5cf6;
      --glow: rgba(59, 130, 246, 0.45);
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: "Microsoft JhengHei", Arial, sans-serif;
      background:
        radial-gradient(circle at 15% 15%, #1e3a8a 0%, transparent 35%),
        radial-gradient(circle at 85% 5%, #4c1d95 0%, transparent 30%),
        linear-gradient(160deg, var(--bg), var(--bg2));
      color: var(--text);
      min-height: 100vh;
    }
    .wrap {
      max-width: 860px;
      margin: 24px auto;
      padding: 0 16px 24px;
    }
    .card {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 18px;
      margin-bottom: 14px;
      backdrop-filter: blur(10px);
      box-shadow: 0 14px 28px rgba(3, 8, 23, 0.45);
    }
    h1 {
      margin: 0 0 8px;
      font-size: 1.5rem;
      letter-spacing: 1px;
      text-shadow: 0 0 14px rgba(147, 197, 253, 0.28);
    }
    h3 {
      margin: 0;
      font-size: 1.35rem;
      letter-spacing: 1px;
      color: #dbeafe;
    }
    p.desc {
      margin: 0;
      color: var(--muted);
      line-height: 1.5;
    }
    .rule-list {
      margin: 12px 0 0;
      padding-left: 20px;
      line-height: 1.7;
    }
    .weeks {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px;
    }
    .day-grid {
      display: grid;
      grid-template-columns: repeat(5, minmax(0, 1fr));
      gap: 10px;
      margin-top: 14px;
    }
    label.day {
      position: relative;
      display: block;
      border: 1px solid rgba(96, 165, 250, 0.36);
      border-radius: 12px;
      padding: 11px 8px;
      text-align: center;
      cursor: pointer;
      user-select: none;
      transition: all 0.22s ease;
      font-size: 0.95rem;
      color: #dbeafe;
      background: linear-gradient(160deg, rgba(30, 58, 138, 0.34), rgba(76, 29, 149, 0.28));
      box-shadow: inset 0 0 0 1px rgba(165, 180, 252, 0.1), 0 0 0 rgba(0, 0, 0, 0);
      overflow: hidden;
    }
    label.day::after {
      content: "";
      position: absolute;
      inset: -50% auto auto -80%;
      width: 70%;
      height: 200%;
      background: linear-gradient(to right, transparent, rgba(191, 219, 254, 0.26), transparent);
      transform: rotate(24deg);
      transition: transform 0.35s ease;
      pointer-events: none;
    }
    label.day:hover {
      border-color: #60a5fa;
      transform: translateY(-2px);
      box-shadow: 0 0 16px rgba(59, 130, 246, 0.28), inset 0 0 0 1px rgba(147, 197, 253, 0.2);
    }
    label.day:hover::after {
      transform: translateX(220%) rotate(24deg);
    }
    label.day:has(input:checked) {
      border-color: #22d3ee;
      color: #ecfeff;
      background: linear-gradient(160deg, rgba(8, 145, 178, 0.5), rgba(37, 99, 235, 0.5));
      box-shadow: 0 0 18px rgba(34, 211, 238, 0.35), 0 0 28px var(--glow);
    }
    input[type="checkbox"] {
      appearance: none;
      width: 16px;
      height: 16px;
      margin-bottom: 8px;
      border-radius: 4px;
      border: 1px solid #93c5fd;
      background: rgba(15, 23, 42, 0.75);
      box-shadow: inset 0 0 8px rgba(59, 130, 246, 0.26);
      vertical-align: middle;
      position: relative;
    }
    input[type="checkbox"]:checked {
      background: linear-gradient(180deg, #22d3ee, #3b82f6);
      border-color: #7dd3fc;
    }
    input[type="checkbox"]:checked::after {
      content: "✓";
      color: #f0f9ff;
      font-size: 12px;
      position: absolute;
      left: 2px;
      top: -1px;
    }
    .stat {
      font-size: 0.95rem;
      color: var(--muted);
      margin-top: 8px;
    }
    .result-list {
      margin: 0;
      padding-left: 20px;
      line-height: 1.8;
    }
    .ok { color: var(--ok); font-weight: 700; }
    .warn { color: var(--warn); font-weight: 700; }
    .actions {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-top: 14px;
    }
    button {
      border: 1px solid transparent;
      border-radius: 10px;
      padding: 10px 14px;
      cursor: pointer;
      font-size: 0.95rem;
      transition: all 0.2s ease;
    }
    .btn-main {
      background: linear-gradient(135deg, var(--main), var(--main2));
      color: #fff;
      box-shadow: 0 10px 20px rgba(37, 99, 235, 0.35);
    }
    .btn-main:hover {
      transform: translateY(-1px);
      box-shadow: 0 14px 24px rgba(59, 130, 246, 0.38);
    }
    .btn-ghost {
      background: rgba(15, 23, 42, 0.42);
      color: #c7d2fe;
      border-color: rgba(167, 139, 250, 0.35);
    }
    .btn-ghost:hover {
      background: rgba(30, 41, 59, 0.68);
    }
    .quota {
      margin-top: 8px;
      color: var(--muted);
    }
    @media (max-width: 700px) {
      .weeks { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <h1>互動式集點網站</h1>
      <p class="desc">勾選每天是否有去上課，系統會自動判斷每週與兩週獎勵。</p>
      <ul class="rule-list">
        <li>5 天去上 <strong>3 天</strong>：一片餅乾</li>
        <li>5 天去上 <strong>5 天</strong>：鼎泰豐</li>
        <li>兩週上滿 <strong>9 天</strong>：一件衣服（1000 扣打）</li>
      </ul>
    </div>

    <div class="weeks">
      <div class="card">
        <h3>第 1 週（5 天）</h3>
        <div class="day-grid" id="week1"></div>
        <div class="stat" id="week1Stat">本週出席：0 / 5</div>
      </div>
      <div class="card">
        <h3>第 2 週（5 天）</h3>
        <div class="day-grid" id="week2"></div>
        <div class="stat" id="week2Stat">本週出席：0 / 5</div>
      </div>
    </div>

    <div class="card">
      <h3>獎勵結果</h3>
      <ul class="result-list">
        <li id="w1Reward">第 1 週獎勵：尚未達成</li>
        <li id="w2Reward">第 2 週獎勵：尚未達成</li>
        <li id="twoWeekReward">兩週獎勵：尚未達成</li>
      </ul>
      <div class="quota" id="quotaText">衣服扣打使用：0 / 1000</div>
      <div class="actions">
        <button class="btn-main" id="saveBtn">儲存進度</button>
        <button class="btn-ghost" id="resetBtn">清空重來</button>
      </div>
    </div>
  </div>

  <script>
    const DAYS = ["Day 1", "Day 2", "Day 3", "Day 4", "Day 5"];
    const STORAGE_KEY = "reward_tracker_v1";

    function buildWeek(containerId, prefix) {
      const wrap = document.getElementById(containerId);
      wrap.innerHTML = "";
      DAYS.forEach((d, i) => {
        const id = prefix + "_" + (i + 1);
        const label = document.createElement("label");
        label.className = "day";
        label.innerHTML = `
          <input type="checkbox" id="${id}" />
          <div>${d}</div>
        `;
        wrap.appendChild(label);
      });
    }

    function countWeek(prefix) {
      let c = 0;
      for (let i = 1; i <= 5; i++) {
        if (document.getElementById(prefix + "_" + i).checked) c++;
      }
      return c;
    }

    function getWeeklyReward(attend) {
      if (attend >= 5) return { text: "鼎泰豐", cls: "ok" };
      if (attend >= 3) return { text: "一片餅乾", cls: "ok" };
      return { text: "尚未達成", cls: "warn" };
    }

    function refresh() {
      const w1 = countWeek("w1");
      const w2 = countWeek("w2");
      const total = w1 + w2;

      document.getElementById("week1Stat").textContent = `本週出席：${w1} / 5`;
      document.getElementById("week2Stat").textContent = `本週出席：${w2} / 5`;

      const r1 = getWeeklyReward(w1);
      const r2 = getWeeklyReward(w2);
      const w1Reward = document.getElementById("w1Reward");
      const w2Reward = document.getElementById("w2Reward");
      w1Reward.innerHTML = `第 1 週獎勵：<span class="${r1.cls}">${r1.text}</span>`;
      w2Reward.innerHTML = `第 2 週獎勵：<span class="${r2.cls}">${r2.text}</span>`;

      const twoWeekReward = document.getElementById("twoWeekReward");
      const quotaText = document.getElementById("quotaText");
      if (total >= 9) {
        twoWeekReward.innerHTML = `兩週獎勵：<span class="ok">一件衣服</span>`;
        quotaText.textContent = "衣服扣打使用：1000 / 1000";
      } else {
        twoWeekReward.innerHTML = `兩週獎勵：<span class="warn">尚未達成（目前 ${total} / 9）</span>`;
        quotaText.textContent = "衣服扣打使用：0 / 1000";
      }
    }

    function save() {
      const data = {};
      for (let i = 1; i <= 5; i++) {
        data["w1_" + i] = document.getElementById("w1_" + i).checked;
        data["w2_" + i] = document.getElementById("w2_" + i).checked;
      }
      localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
      alert("已儲存進度");
    }

    function load() {
      const raw = localStorage.getItem(STORAGE_KEY);
      if (!raw) return;
      try {
        const data = JSON.parse(raw);
        for (let i = 1; i <= 5; i++) {
          document.getElementById("w1_" + i).checked = !!data["w1_" + i];
          document.getElementById("w2_" + i).checked = !!data["w2_" + i];
        }
      } catch (e) {
        console.warn("載入進度失敗", e);
      }
    }

    function resetAll() {
      for (let i = 1; i <= 5; i++) {
        document.getElementById("w1_" + i).checked = false;
        document.getElementById("w2_" + i).checked = false;
      }
      localStorage.removeItem(STORAGE_KEY);
      refresh();
    }

    buildWeek("week1", "w1");
    buildWeek("week2", "w2");

    document.addEventListener("change", function (e) {
      if (e.target && e.target.type === "checkbox") refresh();
    });
    document.getElementById("saveBtn").addEventListener("click", save);
    document.getElementById("resetBtn").addEventListener("click", resetAll);

    load();
    refresh();
  </script>
</body>
</html>
